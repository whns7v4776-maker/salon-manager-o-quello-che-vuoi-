# Supabase local development configuration
# This file is intentionally conservative: it gives the project a standard CLI
# shape without forcing local services until we are ready to wire them up.

project_id = "salon-manager"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = ["./migrations/*.sql"]

[db.seed]
enabled = false
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = [
  "exp://127.0.0.1:8081",
  "salonmanager://auth/callback"
]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
policy = "oneshot"
